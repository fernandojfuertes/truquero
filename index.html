<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover"/>
  <title>🗡️🥇~ Truquero ~🪾🍷</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗡️</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%231a1a1a'/><g stroke='%23ffffff' stroke-width='3' fill='none'><rect x='30' y='30' width='40' height='40'/><rect x='76' y='30' width='40' height='40'/><rect x='122' y='30' width='40' height='40'/><rect x='30' y='76' width='40' height='40'/><rect x='76' y='76' width='40' height='40'/><rect x='122' y='76' width='40' height='40'/><line x1='30' y1='30' x2='70' y2='70'/><line x1='76' y1='30' x2='116' y2='70'/><line x1='122' y1='30' x2='162' y2='70'/><line x1='30' y1='76' x2='70' y2='116'/><line x1='76' y1='76' x2='116' y2='116'/><line x1='122' y1='76' x2='162' y2='116'/></g></svg>">
  <style>
:root {
  --bg: #1a1a1a;
  --bg-card: #1a1a1a;
  --border: #ffffff;
  --text: #ffffff;
  --text-muted: #999999;
  --seg-off: #333333;
  --seg-on: #ffffff;
  --btn-bg: #ffffff;
  --btn-text: #000000;
  --cell: 7.5vh;
  --seg-w: 0.7vh;
  --font: ui-sans-serif, system-ui, -apple-system, sans-serif;
  --radius: 4px;
  --radius-sm: 2px;
}
body.light {
  --bg: #FFFFFF;
  --bg-card: #FFFFFF;
  --border: #000000;
  --text: #000000;
  --text-muted: #666666;
  --seg-off: #E5E5E5;
  --seg-on: #000000;
  --btn-bg: #000000;
  --btn-text: #FFFFFF;
}
*, *::before, *::after { box-sizing: border-box; }
html, body {
  height: 100dvh;
  overflow: hidden;
  position: fixed;
  width: 100%;
  margin: 0;
  touch-action: manipulation;
}
body {
  font-family: var(--font);
  color: var(--text);
  display: flex;
  flex-direction: column;
  background: var(--bg);
}
.bottom-actions {
  height: 7vh;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  padding-bottom: env(safe-area-inset-bottom);
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}
.menu-button {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: clamp(9px, 1.2vh, 11px);
  padding: 0.8vh 1.5vh;
  border-radius: var(--radius);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
  white-space: nowrap;
  transition: background 0.2s, color 0.2s;
}
.menu-button:active {
  background: var(--border);
  color: var(--btn-text);
}
.menu-modal {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.menu-item {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: clamp(9px, 1.2vh, 11px);
  padding: 12px 16px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
  text-align: left;
  border-radius: var(--radius);
  transition: background 0.15s, color 0.15s;
}
.menu-item:active {
  background: var(--border);
  color: var(--btn-text);
}
.btn-top {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: clamp(9px, 1.2vh, 11px);
  padding: 0.8vh 1.5vh;
  border-radius: var(--radius);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
  white-space: nowrap;
  transition: background 0.2s, color 0.2s;
}
.btn-top:active {
  background: var(--border);
  color: var(--btn-text);
}
.board {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  max-width: 424px;
  margin: 0 auto;
  gap: 8px;
  padding: 8px;
  width: 100%;
  min-height: 0;
  position: relative;
  z-index: 1;
}
.board.gallo {
  grid-template-columns: 2fr 1fr;
  max-width: 496px;
}
.dupla-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 0;
  position: relative;
}
.dupla-players {
  display: flex;
  flex: 1;
  min-height: 0;
}
.dupla-divider {
  width: 1px;
  background: var(--border);
  flex-shrink: 0;
  margin: 0 8px;
  align-self: stretch;
}
.dupla-player {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 0;
}
.team {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 0;
  transition: box-shadow 0.2s;
  position: relative;
}
.team::before, .team::after { display: none; }
.header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 5px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  margin-bottom: 8px;
}
.name {
  font-size: clamp(12px, 2vh, 16px);
  font-weight: 700;
  background: transparent;
  border: none;
  border-bottom: 1px solid transparent;
  color: var(--text);
  text-align: left;
  width: 65%;
  padding: 2px 0;
  transition: border-color 0.2s;
  font-family: var(--font);
}
.name:focus {
  outline: none;
  border-bottom-color: var(--border);
}
.total-display {
  font-size: clamp(16px, 3vh, 26px);
  font-weight: 900;
  color: var(--text);
  text-align: right;
}
.bump { animation: bump 0.2s ease; }
@keyframes bump { 50% { transform: scale(1.25); } }
.section {
  background: transparent;
  border: none;
  border-radius: 0;
  padding: 4px 0;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
  margin-top: 0;
}
.section-label {
  font-size: clamp(7px, 1vh, 9px);
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
  text-align: center;
  letter-spacing: 0.5px;
  font-weight: 600;
}
.row {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.cell {
  width: var(--cell);
  height: var(--cell);
  position: relative;
  flex-shrink: 1;
}
.seg {
  position: absolute;
  background: var(--seg-off);
  border-radius: var(--radius-sm);
  transition: background 0.2s ease;
}
.p1 { top: 0; left: 15%; right: 15%; height: var(--seg-w); }
.p2 { top: 15%; right: 0; bottom: 15%; width: var(--seg-w); }
.p3 { bottom: 0; left: 15%; right: 15%; height: var(--seg-w); }
.p4 { top: 15%; left: 0; bottom: 15%; width: var(--seg-w); }
.p5 {
  top: 50%; left: 50%; width: 120%; height: var(--seg-w);
  transform: translate(-50%, -50%) rotate(-45deg);
  z-index: 2;
}
.section-malas {
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
  padding-bottom: 4px;
}
.section-malas .seg.on { background: var(--seg-on); }
.section-buenas .seg.on { background: var(--seg-on); }
.section-single .seg.on { background: var(--seg-on); }
#controls { display: none; }
.controls-bar {
  height: 15vh;
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 8px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  align-items: center;
  justify-items: center;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
  position: relative;
  z-index: 1;
}
.controls-bar.gallo { grid-template-columns: repeat(3, 1fr); gap: 8px; }
.team-controls {
  display: flex;
  gap: 6px;
  justify-content: center;
  align-items: center;
  width: 100%;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.btn-group {
  display: flex;
  gap: 6px;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
}
.btn-action {
  aspect-ratio: 1/1;
  width: 36px;
  height: 36px;
  max-width: 44px;
  max-height: 44px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: clamp(12px, 1.8vh, 16px);
  font-weight: bold;
  color: var(--btn-text);
  background: var(--btn-bg);
  cursor: pointer;
  touch-action: manipulation;
  transition: transform 0.15s, opacity 0.15s;
}
.btn-action:active { transform: scale(0.95); opacity: 0.8; }
.btn-plus, .btn-minus { background: var(--btn-bg); color: var(--btn-text); }
@media (max-width: 600px) {
  .board.gallo {
    --cell: 6.5vh;
    --seg-w: 0.5vh;
    gap: 4px;
    padding: 4px;
  }
  .board.gallo .team,
  .board.gallo .dupla-card { padding: 6px; }
  .board.gallo .dupla-divider { margin: 0 4px; }
  .board.gallo .btn-action { width: 32px; height: 32px; font-size: 14px; }
  .board.gallo .name { font-size: clamp(9px, 1.4vh, 12px); }
  .board.gallo .total-display { font-size: clamp(13px, 2.2vh, 18px); }
  .board.gallo .row { gap: 3px; }
  .board.gallo .section-label { margin-bottom: 3px; }
  .board.gallo .header-row { padding-bottom: 4px; margin-bottom: 4px; }
  .board.gallo .team-controls { margin-top: 4px; padding-top: 4px; gap: 4px; }
  .board.gallo .mano-label { margin-bottom: 4px; }
}
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  padding: 0;
}
.modal-overlay.hidden { display: none; }
.modal-sheet {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 24px 20px;
  width: 100%;
  max-width: 500px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
}
.modal-sheet--tall {
  max-height: 80dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  flex-shrink: 0;
}
.modal-title {
  font-size: clamp(14px, 2vh, 18px);
  font-weight: 700;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}
.modal-actions { display: flex; gap: 8px; margin-top: 20px; }
.modal-btn-primary,
.modal-btn-secondary {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius);
  font-size: clamp(11px, 1.5vh, 14px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  border: 1px solid var(--border);
}
.modal-btn-primary { background: var(--btn-bg); color: var(--btn-text); }
.modal-btn-secondary { background: var(--bg); color: var(--text); }
.setup-size-label {
  font-size: clamp(9px, 1.2vh, 11px);
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 600;
}
.size-selector { display: flex; gap: 8px; margin-bottom: 20px; }
.size-btn {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.size-btn.active { background: var(--btn-bg); color: var(--btn-text); }
.initial-btn {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  pointer-events: auto;
  position: relative;
  z-index: 10;
}
.initial-btn.active { background: var(--btn-bg); color: var(--btn-text); }
.team-section { margin-bottom: 16px; }
.team-section-label {
  font-size: clamp(9px, 1.2vh, 11px);
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 600;
}
.team-inputs { display: flex; flex-direction: column; gap: 6px; }
.player-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  padding: 10px 12px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
}
.player-input:focus { border-color: var(--text); }
.player-input.input-error { border-color: #e55; }
.winner-content { text-align: center; padding: 8px 0 4px; }
.winner-label {
  font-size: clamp(9px, 1.2vh, 11px);
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-muted);
  margin-bottom: 8px;
  font-weight: 600;
}
.winner-name-display {
  font-size: clamp(22px, 4vh, 36px);
  font-weight: 900;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.1;
}
.winner-score-display {
  font-size: clamp(13px, 2vh, 18px);
  color: var(--text-muted);
  font-weight: 600;
}
.history-content { overflow-y: auto; flex: 1; min-height: 0; padding-bottom: 8px; }
.history-empty { text-align: center; color: var(--text-muted); font-size: 14px; padding: 40px 20px; }
.history-section-title {
  font-size: clamp(9px, 1.2vh, 11px);
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  font-weight: 600;
  margin: 20px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.history-stats { display: flex; flex-direction: column; gap: 8px; }
.stat-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--seg-off);
}
.stat-name {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.stat-record { font-size: 13px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
.stat-rate { font-size: 13px; color: var(--text); font-weight: 700; white-space: nowrap; min-width: 40px; text-align: right; }
.stat-streak { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.history-games { display: flex; flex-direction: column; gap: 6px; }
.history-load-more {
  width: 100%;
  margin-top: 12px;
  padding: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: clamp(9px, 1.2vh, 11px);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  font-family: var(--font);
}
.history-load-more:active { background: var(--border); color: var(--btn-text); }
.game-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 6px;
  padding: 8px 0;
  border-bottom: 1px solid var(--seg-off);
}
.game-date {
  grid-column: 1 / -1;
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.game-winner { font-size: 13px; font-weight: 700; color: var(--text); text-align: right; }
.game-vs { font-size: 11px; color: var(--text-muted); text-align: center; font-weight: 600; }
.game-loser { font-size: 13px; color: var(--text-muted); text-align: left; }
.game-score { font-size: 11px; color: var(--text-muted); text-align: center; }
@media (max-width: 480px) {
  .bottom-actions { gap: 5px; padding-left: 6px; padding-right: 6px; }
  .btn-top { flex: 1; padding: 0.8vh 0; font-size: 9px; letter-spacing: 0.3px; }
}
@media (orientation: landscape) and (max-width: 1023px) {
  :root { --cell: 13vh; --seg-w: 0.9vh; }
  .board { max-width: 440px; gap: 6px; padding: 6px; }
  .board.gallo { max-width: 496px; }
  .section .row { flex-direction: row; justify-content: center; gap: 4px; }
  .section-label { margin-bottom: 4px; }
  .section-malas { margin-bottom: 4px; padding-bottom: 4px; }
  .btn-action { width: 36px; height: 36px; font-size: 18px; }
  .team-controls { margin-top: 4px; padding-top: 4px; }
  .bottom-actions { height: 6vh; max-width: 496px; }
  .bottom-actions .btn-top { flex: 1; padding: 0.6vh 0.8vh; font-size: 12px; }
}
@media (orientation: landscape) and (min-width: 1024px) {
  :root { --cell: 8vh; --seg-w: 0.6vh; }
  .board { max-width: 424px; }
  .board.gallo { max-width: 496px; }
  .bottom-actions { max-width: 800px; }
}
  </style>
</head>
<body>

  <div id="board"></div>
  <div id="controls"></div>

  <div class="bottom-actions">
    <button class="btn-top" id="historyBtn" aria-label="Ver historial">Historial</button>
    <button class="btn-top" id="siguienteMano" style="display:none" aria-label="Siguiente mano">Sig. Mano</button>
    <button class="btn-top" id="resetBtn" aria-label="Reiniciar partida">Reiniciar</button>
    <button class="btn-top" id="toggleDarkMode" aria-label="Cambiar tema claro/oscuro">◑</button>
  </div>

  <!-- Menu modal -->
  <div id="menuModal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="menu-modal">
      </div>
    </div>
  </div>

  <!-- Initial config modal -->
  <div id="initialModal" class="modal-overlay">
    <div class="modal-sheet">
      <div class="modal-title" style="margin-bottom:20px">Configurar Partida</div>

      <div class="team-section">
        <div class="team-section-label">Modalidad</div>
        <div class="size-selector">
          <button class="initial-btn active" onclick="selectInitialMode('dupla', this)">Normal</button>
          <button class="initial-btn" onclick="selectInitialMode('gallo', this)">Gallo</button>
        </div>
      </div>

      <div class="team-section">
        <div class="team-section-label">Puntos</div>
        <div class="size-selector">
          <button class="initial-btn" onclick="selectInitialPoints(15, this)">15</button>
          <button class="initial-btn active" onclick="selectInitialPoints(30, this)">30</button>
        </div>
      </div>

      <div class="modal-actions">
        <button class="modal-btn-primary" onclick="startGame()">Siguiente</button>
      </div>
    </div>
  </div>

  <!-- Setup modal -->
  <div id="setupModal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-title" style="margin-bottom:16px">Jugar por puntos</div>
      <div class="setup-size-label">Jugadores por equipo</div>
      <div class="size-selector">
        <button class="size-btn active" data-size="1">1</button>
        <button class="size-btn" data-size="2">2</button>
        <button class="size-btn" data-size="3">3</button>
      </div>
      <div class="team-section">
        <div class="team-section-label">Equipo 1</div>
        <div id="team1Inputs" class="team-inputs"></div>
      </div>
      <div class="team-section">
        <div class="team-section-label">Equipo 2</div>
        <div id="team2Inputs" class="team-inputs"></div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn-secondary" id="cancelSetup">Atrás</button>
        <button class="modal-btn-primary" id="confirmSetup">Jugar</button>
      </div>
    </div>
  </div>

  <!-- Winner overlay -->
  <div id="winnerOverlay" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="winner-content">
        <div class="winner-label" id="winnerLabel">Ganaron</div>
        <div class="winner-name-display" id="winnerName"></div>
        <div class="winner-score-display" id="winnerScore"></div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn-secondary" id="skipSaveBtn">No guardar</button>
        <button class="modal-btn-primary" id="saveGameBtn">Guardar</button>
      </div>
    </div>
  </div>

  <!-- History overlay -->
  <div id="historyOverlay" class="modal-overlay hidden">
    <div class="modal-sheet modal-sheet--tall">
      <div class="modal-header">
        <div class="modal-title">Historial</div>
        <button class="modal-close" id="closeHistory" aria-label="Cerrar historial">✕</button>
      </div>
      <div id="historyContent" class="history-content"></div>
    </div>
  </div>

  <!-- Confirm reset modal -->
  <div id="confirmModal" class="modal-overlay hidden">
    <div class="modal-sheet">
      <div class="modal-title" style="margin-bottom:12px">Reiniciar</div>
      <p style="color:var(--text-muted);font-size:14px;margin:0 0 4px">¿Reiniciar los puntos?</p>
      <div class="modal-actions">
        <button class="modal-btn-secondary" id="confirmModalCancel">Cancelar</button>
        <button class="modal-btn-primary" id="confirmModalOk">Reiniciar</button>
      </div>
    </div>
  </div>

  <script>
// === CONSTANTS ===
const POINTS_PER_CELL    = 5;
const CELLS_PER_SECTION  = 3;
const SEGMENTS_PER_SECTION = POINTS_PER_CELL * CELLS_PER_SECTION; // 15
const GALLO_ROTATION     = [2, 0, 1];
const MAX_HISTORY_PAGE   = 20;
const UNDO_LIMIT         = 10;
const DEFAULT_NAMES      = ['Nosotros', 'Ellos'];

// === STATE ===
const state = {
  teams: [
    { name: DEFAULT_NAMES[0], score: 0 },
    { name: DEFAULT_NAMES[1], score: 0 }
  ],
  TARGET: 30,
  mano: 0
};

let rankedConfig = { active: false, teamSize: 1, teams: [[], []] };
let gameHistory  = [];
let undoStack    = [];

// === DOM REFS ===
const board            = document.getElementById('board');
const controls         = document.getElementById('controls');
const toggleGalloBtn   = document.getElementById('toggleGallo');
const siguienteManoBtn = document.getElementById('siguienteMano');
const resetBtn         = document.getElementById('resetBtn');
const toggleDarkBtn    = document.getElementById('toggleDarkMode');
const toggleTargetBtn  = document.getElementById('toggleTarget');
const byPointsBtn      = document.getElementById('byPointsBtn');
const historyBtn       = document.getElementById('historyBtn');
const initialModal     = document.getElementById('initialModal');
const setupModal       = document.getElementById('setupModal');
const winnerOverlay    = document.getElementById('winnerOverlay');
const historyOverlay   = document.getElementById('historyOverlay');
const confirmModal     = document.getElementById('confirmModal');
const menuModal        = document.getElementById('menuModal');

// === ELEMENT CACHE ===
let teamElements       = [];
let savedGallo         = null;
let pendingWinnerIndex = -1;
let setupSize          = 1;
let historyPage        = {};
let initialMode        = 'dupla';
let initialPoints      = 30;

// === PERSISTENCE (disabled) ===
function saveState() {}
function loadState() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) {
    console.warn('AudioContext no disponible:', e);
  }
}
function loadHistory() {}
function saveHistory() {}

// === THEME ===
function loadTheme() {
  if (localStorage.getItem('lightMode') === 'true') document.body.classList.add('light');
  updateThemeBtn();
}

function toggleTheme() {
  document.body.classList.toggle('light');
  localStorage.setItem('lightMode', document.body.classList.contains('light'));
  updateThemeBtn();
}

function updateThemeBtn() {
  toggleDarkBtn.textContent = document.body.classList.contains('light') ? '◐' : '◑';
}

// === TARGET TOGGLE ===
function toggleTarget() {
  state.TARGET = state.TARGET === 30 ? 15 : 30;
  state.teams.forEach(t => { t.score = 0; });
  undoStack = [];
  updateTargetBtn();
  render();
  saveState();
}

function updateTargetBtn() {
  if (toggleTargetBtn) {
    const nextTarget = state.TARGET === 15 ? 30 : 15;
    toggleTargetBtn.textContent = `${nextTarget} puntos`;
  }
}

// === SOUND ===
let audioCtx = null;

function playTone(freq, duration, type = 'sine', gainVal = 0.3) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(gainVal, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {
    console.warn('Error reproduciendo sonido:', e);
  }
}

function soundAdd()    { playTone(660, 0.12); }
function soundRemove() { playTone(220, 0.1, 'sine', 0.2); }

// === HELPERS ===
function teamKey(players) {
  return [...players].sort().join('+');
}

function teamLabel(players) {
  if (!players?.length) return '';
  if (players.length === 1) return players[0];
  if (players.length === 2) return `${players[0]} y ${players[1]}`;
  return `${players.slice(0, -1).join(', ')} y ${players[players.length - 1]}`;
}

function teamInitials(players) {
  if (!players?.length) return '';
  return players.map(p => (p.trim()[0] || '?').toUpperCase()).join('·');
}

// === GALLO PAIR ===
function getGalloPair() {
  const galloIdx = GALLO_ROTATION[state.mano % GALLO_ROTATION.length];
  return { galloIdx, pairIdx: [0, 1, 2].filter(i => i !== galloIdx) };
}

// === SEGMENTS ===
function updateSegments(segmentEls, totalScore) {
  const numSections = segmentEls.length / SEGMENTS_PER_SECTION;
  for (let section = 0; section < numSections; section++) {
    const offset    = section * SEGMENTS_PER_SECTION;
    const inSection = Math.max(0, Math.min(SEGMENTS_PER_SECTION, totalScore - offset));
    for (let cell = 0; cell < CELLS_PER_SECTION; cell++) {
      const cellPts = Math.max(0, Math.min(POINTS_PER_CELL, inSection - cell * POINTS_PER_CELL));
      for (let seg = 0; seg < POINTS_PER_CELL; seg++) {
        segmentEls[section * SEGMENTS_PER_SECTION + cell * POINTS_PER_CELL + seg]
          .classList.toggle('on', (seg + 1) <= cellPts);
      }
    }
  }
}

function updateScore(index) {
  const refs = teamElements[index]?._refs;
  if (!refs) return;
  const score = state.teams[index].score;
  refs.totalDisplay.textContent = score;
  refs.totalDisplay.setAttribute('aria-label', `Puntos: ${score}`);
  refs.totalDisplay.classList.remove('bump');
  void refs.totalDisplay.offsetWidth;
  refs.totalDisplay.classList.add('bump');
  updateSegments(refs.segments, score);
}

// === DOM BUILDING ===
function buildSections(container) {
  const segments = [];
  const defs = state.TARGET === 15
    ? [{ label: null, cls: 'section section-single' }]
    : [
        { label: 'Malas',  cls: 'section section-malas'  },
        { label: 'Buenas', cls: 'section section-buenas' }
      ];

  defs.forEach(({ label, cls }) => {
    const section = document.createElement('div');
    section.className = cls;

    if (label) {
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = label;
      section.appendChild(lbl);
    }

    const row = document.createElement('div');
    row.className = 'row';
    for (let cell = 0; cell < CELLS_PER_SECTION; cell++) {
      const cellDiv = document.createElement('div');
      cellDiv.className = 'cell';
      for (let seg = 1; seg <= POINTS_PER_CELL; seg++) {
        const s = document.createElement('div');
        s.className = 'seg p' + seg;
        cellDiv.appendChild(s);
        segments.push(s);
      }
      row.appendChild(cellDiv);
    }
    section.appendChild(row);
    container.appendChild(section);
  });
  return segments;
}

function buildScorePanel(team, index, { className, showControls }) {
  const el = document.createElement('div');
  el.className = className;

  const headerRow = document.createElement('div');
  headerRow.className = 'header-row';

  const nameInput = document.createElement('input');
  nameInput.className = 'name';
  nameInput.value = team.name;
  nameInput.setAttribute('aria-label', `Nombre del equipo ${index + 1}`);
  nameInput.addEventListener('input', e => {
    state.teams[index].name = e.target.value;
    saveState();
  });

  const totalDisplay = document.createElement('div');
  totalDisplay.className = 'total-display';
  totalDisplay.textContent = team.score;
  totalDisplay.setAttribute('aria-live', 'polite');
  totalDisplay.setAttribute('aria-label', `Puntos: ${team.score}`);

  headerRow.append(nameInput, totalDisplay);
  el.appendChild(headerRow);

  const segments = buildSections(el);

  if (showControls) {
    const teamControls = document.createElement('div');
    teamControls.className = 'team-controls';

    const plusBtn = document.createElement('button');
    plusBtn.className = 'btn-action btn-plus';
    plusBtn.textContent = '+';
    plusBtn.setAttribute('aria-label', `Sumar punto a ${team.name}`);
    plusBtn.addEventListener('click', () => addPoints(index, 1));

    const minusBtn = document.createElement('button');
    minusBtn.className = 'btn-action btn-minus';
    minusBtn.textContent = '-';
    minusBtn.setAttribute('aria-label', `Restar punto a ${team.name}`);
    minusBtn.addEventListener('click', () => addPoints(index, -1));

    teamControls.append(plusBtn, minusBtn);
    el.appendChild(teamControls);
  }

  el._refs = { nameInput, totalDisplay, segments };
  return el;
}

function buildTeamElement(team, index) {
  return buildScorePanel(team, index, { className: 'team', showControls: true });
}

function buildPlayerColumn(team, index) {
  return buildScorePanel(team, index, { className: 'dupla-player', showControls: false });
}

function buildDuplaCard(pairIdx) {
  const card = document.createElement('div');
  card.className = 'dupla-card';

  const playersRow = document.createElement('div');
  playersRow.className = 'dupla-players';

  pairIdx.forEach((idx, i) => {
    if (i > 0) {
      const div = document.createElement('div');
      div.className = 'dupla-divider';
      playersRow.appendChild(div);
    }
    const col = buildPlayerColumn(state.teams[idx], idx);
    playersRow.appendChild(col);
    teamElements[idx] = col;
    updateSegments(col._refs.segments, state.teams[idx].score);
  });

  card.appendChild(playersRow);

  const sharedControls = document.createElement('div');
  sharedControls.className = 'team-controls';

  const plusBtn = document.createElement('button');
  plusBtn.className = 'btn-action btn-plus';
  plusBtn.textContent = '+';
  plusBtn.setAttribute('aria-label', 'Sumar punto a la dupla');
  plusBtn.addEventListener('click', () => addPointsDupla(1));

  const minusBtn = document.createElement('button');
  minusBtn.className = 'btn-action btn-minus';
  minusBtn.textContent = '-';
  minusBtn.setAttribute('aria-label', 'Restar punto a la dupla');
  minusBtn.addEventListener('click', () => addPointsDupla(-1));

  sharedControls.append(plusBtn, minusBtn);
  card.appendChild(sharedControls);
  return card;
}

function buildControlGroup(index) {
  const group = document.createElement('div');
  group.className = 'btn-group';
  const minus = document.createElement('button');
  minus.className = 'btn-action btn-minus';
  minus.textContent = '-';
  minus.setAttribute('aria-label', `Restar punto a ${state.teams[index].name}`);
  minus.addEventListener('click', () => addPoints(index, -1));
  const plus = document.createElement('button');
  plus.className = 'btn-action btn-plus';
  plus.textContent = '+';
  plus.setAttribute('aria-label', `Sumar punto a ${state.teams[index].name}`);
  plus.addEventListener('click', () => addPoints(index, 1));
  group.append(minus, plus);
  return group;
}

// === RENDER ===
function render() {
  board.innerHTML = '';
  controls.innerHTML = '';
  teamElements = [];

  const isGallo = state.teams.length === 3;
  if (toggleGalloBtn) toggleGalloBtn.textContent = 'Gallo';
  if (siguienteManoBtn) siguienteManoBtn.style.display = isGallo ? '' : 'none';
  if (byPointsBtn) byPointsBtn.style.display = isGallo ? 'none' : '';
  if (historyBtn) historyBtn.style.display = isGallo ? 'none' : '';

  if (isGallo) {
    board.className = 'board gallo';
    renderGalloBoard();
  } else {
    board.className = 'board';
    state.teams.forEach((team, index) => {
      const teamEl = buildTeamElement(team, index);
      board.appendChild(teamEl);
      teamElements[index] = teamEl;
      controls.appendChild(buildControlGroup(index));
      updateSegments(teamEl._refs.segments, team.score);
    });
  }
}

function renderGalloBoard() {
  const { pairIdx, galloIdx } = getGalloPair();
  board.appendChild(buildDuplaCard(pairIdx));

  const galloCard = buildTeamElement(state.teams[galloIdx], galloIdx);
  board.appendChild(galloCard);
  teamElements[galloIdx] = galloCard;
  updateSegments(galloCard._refs.segments, state.teams[galloIdx].score);
}

// === UNDO ===
function pushUndo() {
  undoStack.push(JSON.stringify({
    teams: state.teams.map(t => ({ ...t })),
    mano: state.mano
  }));
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
}

function undo() {
  if (!undoStack.length) return;
  const snapshot = JSON.parse(undoStack.pop());
  if (snapshot.teams.length !== state.teams.length) { undoStack = []; return; }
  snapshot.teams.forEach((t, i) => {
    state.teams[i].score = t.score;
    state.teams[i].name  = t.name;
  });
  state.mano = snapshot.mano;
  state.teams.forEach((_, i) => updateScore(i));
  saveState();
}

// === ACTIONS ===
function addPoints(index, delta, { skipUndo = false } = {}) {
  const team = state.teams[index];
  const prev = team.score;
  const next = Math.max(0, Math.min(state.TARGET, team.score + delta));
  if (next === prev) return;
  if (!skipUndo) pushUndo();
  team.score = next;
  delta > 0 ? soundAdd() : soundRemove();
  updateScore(index);
  saveState();
  if (team.score === state.TARGET && state.teams.length === 2 && rankedConfig.active && state.TARGET === 30) {
    showWinnerOverlay(index);
  }
}

function addPointsDupla(delta) {
  pushUndo();
  getGalloPair().pairIdx.forEach(idx => addPoints(idx, delta, { skipUndo: true }));
}

function siguienteMano() {
  state.mano += 1;
  render();
  saveState();
}

function doReset() {
  location.reload();
}

function resetAll() {
  confirmModal.classList.remove('hidden');
}

// === SETUP MODAL ===
function openSetupModal() {
  setupSize = 1;
  refreshSizeBtns();
  refreshPlayerInputs();
  setupModal.classList.remove('hidden');
}

function refreshSizeBtns() {
  document.querySelectorAll('.size-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.size) === setupSize);
  });
}

function refreshPlayerInputs() {
  [1, 2].forEach(teamNum => {
    const container = document.getElementById(`team${teamNum}Inputs`);
    container.innerHTML = '';
    for (let i = 0; i < setupSize; i++) {
      const input = document.createElement('input');
      input.type        = 'text';
      input.className   = 'player-input';
      input.placeholder = teamNum === 1 ? 'Nosotros' : 'Ellos';
      input.maxLength   = 15;
      input.setAttribute('aria-label', `Nombre del jugador ${i + 1} del equipo ${teamNum}`);
      container.appendChild(input);
    }
  });
  setTimeout(() => setupModal.querySelector('.player-input')?.focus(), 50);
}

function confirmSetup() {
  const getNames = n =>
    [...document.querySelectorAll(`#team${n}Inputs .player-input`)]
      .map(i => i.value.trim() || i.placeholder);

  const names1 = getNames(1);
  const names2 = getNames(2);

  rankedConfig          = { active: true, teamSize: setupSize, teams: [names1, names2] };
  state.teams[0].name   = setupSize === 1 ? teamLabel(names1) : teamInitials(names1);
  state.teams[1].name   = setupSize === 1 ? teamLabel(names2) : teamInitials(names2);

  setupModal.classList.add('hidden');
  render();
  saveState();
}

// === WINNER OVERLAY ===
function showWinnerOverlay(winnerIndex) {
  pendingWinnerIndex = winnerIndex;
  const winner = rankedConfig.teams[winnerIndex];

  document.getElementById('winnerLabel').textContent =
    rankedConfig.teamSize === 1 ? 'Ganó' : 'Ganaron';
  document.getElementById('winnerName').textContent  = teamLabel(winner);
  document.getElementById('winnerScore').textContent =
    `${state.teams[winnerIndex].score}–${state.teams[1 - winnerIndex].score}`;

  winnerOverlay.classList.remove('hidden');
}

function saveGame(winnerIndex) {
  gameHistory.unshift({
    date:      new Date().toISOString(),
    teamSize:  rankedConfig.teamSize,
    teams:     rankedConfig.teams.map((players, i) => ({
      players,
      score: state.teams[i].score
    })),
    winnerKey: teamKey(rankedConfig.teams[winnerIndex])
  });
  saveHistory();
}

// === HISTORY VIEW ===
function openHistory() {
  historyPage = {};
  renderHistoryView();
  historyOverlay.classList.remove('hidden');
}

function renderHistoryView() {
  const content = document.getElementById('historyContent');

  if (gameHistory.length === 0) {
    content.innerHTML = '<p class="history-empty">Todavía no hay partidas registradas.</p>';
    return;
  }

  const byMode = {};
  gameHistory.forEach(game => {
    const size = game.teamSize || 1;
    if (!byMode[size]) byMode[size] = [];
    byMode[size].push(game);
  });

  let html = '';

  [1, 2, 3].forEach(size => {
    const games = byMode[size];
    if (!games) return;

    const modeLabel = `${size}v${size}`;
    const page      = historyPage[size] || 1;
    const shown     = page * MAX_HISTORY_PAGE;

    const stats = {};
    games.forEach(game => {
      game.teams.forEach(team => {
        const key = teamKey(team.players);
        if (!stats[key]) stats[key] = { label: teamLabel(team.players), wins: 0, games: 0 };
        stats[key].games++;
        if (key === game.winnerKey) stats[key].wins++;
      });
    });

    Object.keys(stats).forEach(key => {
      let streak = 0;
      for (const game of games) {
        if (!game.teams.some(t => teamKey(t.players) === key)) continue;
        if (game.winnerKey === key) streak++;
        else break;
      }
      stats[key].streak  = streak;
      stats[key].winRate = stats[key].games
        ? Math.round(stats[key].wins / stats[key].games * 100) : 0;
    });

    const sorted = Object.values(stats).sort((a, b) => b.wins - a.wins || b.winRate - a.winRate);

    html += `<div class="history-section-title">${modeLabel} — Estadísticas</div>`;
    html += '<div class="history-stats">';
    sorted.forEach(s => {
      const streak = s.streak >= 2
        ? `<span class="stat-streak">${s.streak} seguidas</span>` : '';
      html += `
        <div class="stat-row">
          <span class="stat-name">${s.label}</span>
          <span class="stat-record">${s.wins}G&nbsp;${s.games - s.wins}P</span>
          <span class="stat-rate">${s.winRate}%</span>
          ${streak}
        </div>`;
    });
    html += '</div>';

    html += `<div class="history-section-title" style="margin-top:16px">${modeLabel} — Partidas</div>`;
    html += '<div class="history-games">';
    games.slice(0, shown).forEach(game => {
      const d       = new Date(game.date);
      const dateStr = `${d.getDate()}/${d.getMonth() + 1} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const winner  = game.teams.find(t => teamKey(t.players) === game.winnerKey);
      const loser   = game.teams.find(t => teamKey(t.players) !== game.winnerKey);
      html += `
        <div class="game-row">
          <span class="game-date">${dateStr}</span>
          <span class="game-result">
            <span class="game-winner">${teamLabel(winner?.players)}</span>
            <span class="game-vs"> vs </span>
            <span class="game-loser">${teamLabel(loser?.players)}</span>
          </span>
          <span class="game-score">${winner?.score ?? 0}–${loser?.score ?? 0}</span>
        </div>`;
    });

    if (games.length > shown) {
      html += `<button class="history-load-more" data-mode="${size}">Ver más (${games.length - shown} restantes)</button>`;
    }

    html += '</div>';
  });

  content.innerHTML = html;

  content.querySelectorAll('.history-load-more').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = parseInt(btn.dataset.mode);
      historyPage[mode] = (historyPage[mode] || 1) + 1;
      renderHistoryView();
    });
  });
}

// === KEYBOARD SHORTCUTS ===
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if ([setupModal, winnerOverlay, confirmModal, menuModal].some(m => !m.classList.contains('hidden'))) return;

  const isGallo = state.teams.length === 3;

  switch(e.key) {
    case 'ArrowLeft':
      e.preventDefault();
      if (isGallo) {
        e.shiftKey ? addPointsDupla(-1) : addPointsDupla(1);
      } else {
        e.shiftKey ? addPoints(0, -1) : addPoints(0, 1);
      }
      break;
    case 'ArrowRight':
      e.preventDefault();
      if (isGallo) {
        const { galloIdx } = getGalloPair();
        e.shiftKey ? addPoints(galloIdx, -1) : addPoints(galloIdx, 1);
      } else {
        e.shiftKey ? addPoints(1, -1) : addPoints(1, 1);
      }
      break;
    case 'z':
    case 'Z':
      if (e.ctrlKey || e.metaKey) {
        e.preventDefault();
        undo();
      }
      break;
  }
});

// === EVENT LISTENERS ===
if (toggleGalloBtn) {
  toggleGalloBtn.addEventListener('click', () => {
    if (state.teams.length === 2) {
      state.teams.push(savedGallo || { name: 'Gallo', score: 0 });
      savedGallo = null;
      state.mano = 0;
    } else {
      savedGallo = state.teams.pop();
    }
    undoStack = [];
    render();
    saveState();
  });
}

if (siguienteManoBtn) siguienteManoBtn.addEventListener('click', siguienteMano);
if (resetBtn) resetBtn.addEventListener('click', resetAll);
if (toggleDarkBtn) toggleDarkBtn.addEventListener('click', toggleTheme);
if (toggleTargetBtn) toggleTargetBtn.addEventListener('click', toggleTarget);
if (byPointsBtn) byPointsBtn.addEventListener('click', openSetupModal);
if (historyBtn) historyBtn.addEventListener('click', openHistory);

document.querySelectorAll('.size-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    setupSize = parseInt(btn.dataset.size);
    refreshSizeBtns();
    refreshPlayerInputs();
  });
});

document.getElementById('confirmSetup').addEventListener('click', confirmSetup);
document.getElementById('cancelSetup').addEventListener('click', () => {
  setupModal.classList.add('hidden');
  initialModal.classList.remove('hidden');
});

document.addEventListener('input', e => {
  if (e.target.classList.contains('player-input')) e.target.classList.remove('input-error');
});

document.getElementById('saveGameBtn').addEventListener('click', () => {
  if (pendingWinnerIndex >= 0) {
    saveGame(pendingWinnerIndex);
    pendingWinnerIndex = -1;
  }
  winnerOverlay.classList.add('hidden');
  state.teams.forEach((t, i) => { t.score = 0; t.name = DEFAULT_NAMES[i] ?? `Equipo ${i + 1}`; });
  rankedConfig = { active: false, teamSize: 1, teams: [[], []] };
  render();
  saveState();
});

document.getElementById('skipSaveBtn').addEventListener('click', () => {
  pendingWinnerIndex = -1;
  winnerOverlay.classList.add('hidden');
});

document.getElementById('closeHistory').addEventListener('click', () => {
  historyOverlay.classList.add('hidden');
});

document.getElementById('confirmModalOk').addEventListener('click', () => {
  confirmModal.classList.add('hidden');
  doReset();
});
document.getElementById('confirmModalCancel').addEventListener('click', () => {
  confirmModal.classList.add('hidden');
});

[setupModal, winnerOverlay, historyOverlay, confirmModal, menuModal].forEach(modal => {
  modal.addEventListener('click', e => {
    if (e.target === modal) {
      if (modal === winnerOverlay) pendingWinnerIndex = -1;
      modal.classList.add('hidden');
    }
  });
});

// === INITIAL CONFIG MODAL ===
function updateInitialCounter() {
  const counter = document.getElementById('initialCounter');
  if (counter) counter.textContent = initialPoints;
}

function selectInitialMode(mode, btn) {
  console.log('selectInitialMode called:', mode);
  initialMode = mode;
  const parent = btn.parentElement;
  parent.querySelectorAll('.initial-btn').forEach(b => {
    b.classList.remove('active');
  });
  btn.classList.add('active');
}

function selectInitialPoints(points, btn) {
  console.log('selectInitialPoints called:', points);
  initialPoints = points;
  updateInitialCounter();
  const parent = btn.parentElement;
  parent.querySelectorAll('.initial-btn').forEach(b => {
    b.classList.remove('active');
  });
  btn.classList.add('active');
}

function startGame() {
  console.log('startGame called, mode:', initialMode, 'points:', initialPoints);
  state.TARGET = initialPoints;
  if (initialMode === 'gallo') {
    state.teams.push({ name: 'Gallo', score: 0 });
  }
  initialModal.classList.add('hidden');
  openSetupModal();
}

// === MENU MODAL ===
const menuToggle = document.getElementById('menuToggle');

function closeMenuModal() {
  menuModal.classList.add('hidden');
}

menuToggle.addEventListener('click', () => {
  menuModal.classList.remove('hidden');
});

menuModal.querySelectorAll('.menu-item').forEach(item => {
  item.addEventListener('click', closeMenuModal);
});

// === INIT ===
loadTheme();
loadState();
loadHistory();
// Initial modal is shown by default
  </script>
</body>
</html>
